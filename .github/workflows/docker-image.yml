name: CI Pipeline

# 1. Triggers on push to "main"
on:
  push:
    branches:
      - main
  # Optional: Also trigger on PRs to main for testing
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Check out the repo
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (required for advanced layer caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub using secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build and push each microservice using best practices (Layer caching enabled)

      # 4.1 Build & Push AuthService
      - name: Build and push AuthService
        uses: docker/build-push-action@v5
        with:
          context: ./AuthService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-auth:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-auth:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-auth:buildcache,mode=max

      # 4.2 Build & Push UserService
      - name: Build and push UserService
        uses: docker/build-push-action@v5
        with:
          context: ./UserService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-user:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-user:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-user:buildcache,mode=max

      # 4.3 Build & Push CourseService
      - name: Build and push CourseService
        uses: docker/build-push-action@v5
        with:
          context: ./CourseService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-course:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-course:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-course:buildcache,mode=max

      # 4.4 Build & Push ProgressService
      - name: Build and push ProgressService
        uses: docker/build-push-action@v5
        with:
          context: ./ProgressService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-progress:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-progress:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-progress:buildcache,mode=max

      # 4.5 Build & Push AnalyticsService
      - name: Build and push AnalyticsService
        uses: docker/build-push-action@v5
        with:
          context: ./AnalyticsService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-analytics:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-analytics:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-analytics:buildcache,mode=max

      # 4.6 Build & Push Gateway
      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./Gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-gateway:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-gateway:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-gateway:buildcache,mode=max

      # 4.7 Build & Push ai-service
      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-ai:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-ai:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/intelligentlms-ai:buildcache,mode=max
