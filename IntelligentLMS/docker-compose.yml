services:
  redis:
    image: redis:7-alpine
    container_name: lms_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/IntelligentLMS.Gateway/Dockerfile
    ports:
      - "5000:8080"
    restart: on-failure
    environment:
      - ReverseProxy__Clusters__auth-cluster__Destinations__destination1__Address=http://auth-service:8080
      - ReverseProxy__Clusters__user-cluster__Destinations__destination1__Address=http://user-service:8080
      - ReverseProxy__Clusters__course-cluster__Destinations__destination1__Address=http://course-service:8080
      - ReverseProxy__Clusters__progress-cluster__Destinations__destination1__Address=http://progress-service:8080
      - ReverseProxy__Clusters__ai-cluster__Destinations__destination1__Address=http://ai-service:8000
      - Jwt__Issuer=intelligent-lms
      - Jwt__Audience=intelligent-lms
      - Jwt__Key=super_secret_key_for_intelligent_lms_dev_12345
    depends_on:
      - auth-service
      - user-service
      - course-service
      - progress-service
      - analytics-service
      - ai-service

  auth-service:
    build:
      context: .
      dockerfile: src/Services/Auth/IntelligentLMS.Auth/Dockerfile
    restart: on-failure
    environment:
      - Kafka__BootstrapServers=kafka:9092
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=lms_auth;Username=admin;Password=password
      - Jwt__Key=super_secret_key_for_intelligent_lms_dev_12345
      - Jwt__Issuer=intelligent-lms
      - Jwt__Audience=intelligent-lms
      - Email__Host=${SMTP_HOST:-smtp.gmail.com}
      - Email__Port=${SMTP_PORT:-587}
      - Email__User=${SMTP_USER}
      - Email__Password=${SMTP_PASS}
      - Email__From=${SMTP_FROM}
    depends_on:
      - postgres
      - kafka

  user-service:
    build:
      context: .
      dockerfile: src/Services/User/IntelligentLMS.User/Dockerfile
    restart: on-failure
    environment:
      - Kafka__BootstrapServers=kafka:9092
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=lms_user;Username=admin;Password=password

    depends_on:
      - postgres
      - kafka

  course-service:
    build:
      context: .
      dockerfile: src/Services/Course/IntelligentLMS.Course/Dockerfile
    restart: on-failure
    environment:
      - Kafka__BootstrapServers=kafka:9092
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=lms_course;Username=admin;Password=password
      - Redis__ConnectionString=redis:6379
      - Jwt__Key=super_secret_key_for_intelligent_lms_dev_12345
      - Jwt__Issuer=intelligent-lms
      - Jwt__Audience=intelligent-lms
      - Vnpay__TmnCode=65NHND8M
      - Vnpay__HashSecret=YRXFVQH3DUKOB8WSCY9R9MOE1DBMFKNR
      - Vnpay__Url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - Vnpay__ReturnUrl=http://localhost:5000/payments/vnpay/return
      - ProgressServiceUrl=http://progress-service:8080
      - FrontendBaseUrl=http://localhost:5173

    depends_on:
      - postgres
      - kafka
      - redis

  progress-service:
    build:
      context: .
      dockerfile: src/Services/Progress/IntelligentLMS.Progress/Dockerfile
    restart: on-failure
    environment:
      - Kafka__BootstrapServers=kafka:9092
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=lms_progress;Username=admin;Password=password
      - CourseServiceUrl=http://course-service:8080
      - Redis__ConnectionString=redis:6379

    depends_on:
      - postgres
      - kafka
      - redis

  analytics-service:
    build:
      context: .
      dockerfile: src/Services/Analytics/IntelligentLMS.Analytics/Dockerfile
    restart: on-failure
    environment:
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__GroupId=analytics-group
    depends_on:
      - kafka

  ai-service:
    build:
      context: src/Services/AI
      dockerfile: Dockerfile
    container_name: lms_ai_service
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - kafka
      - redis
      - ollama

  celery-worker:
    build:
      context: src/Services/AI
      dockerfile: Dockerfile
    container_name: lms_celery_worker
    command: ["celery", "-A", "app.celery_worker.celery", "worker", "--loglevel=info"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
    depends_on:
      - redis
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: lms_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: lms_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/BuildingBlocks/Docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  kafka:
    image: apache/kafka:3.7.0
    container_name: lms_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  ollama_data:
